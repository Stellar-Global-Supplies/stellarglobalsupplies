name: 🚀 Deploy — Stellar Ops Control Center

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tf_action:
        description: 'Terraform action (plan | apply | destroy)'
        required: false
        default: 'apply'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

# ─────────────────────────────────────────────────────────────────────────────
# REQUIRED GITHUB SECRETS  (Settings → Secrets and variables → Actions)
# ─────────────────────────────────────────────────────────────────────────────
# The workflow uses OIDC-based IAM Role assumption (no static credentials needed).
# 
# Your GitHub Actions OIDC provider must be configured in your AWS account,
# and the IAM role below must trust it with a condition on the repo.
#
# AWS_ROLE_ARN                      IAM role ARN (GitHub OIDC federated) with deploy permissions
# AWS_REGION                         e.g. ap-south-1
# TF_BACKEND_BUCKET                  S3 bucket for Terraform state  (create once)
# TF_BACKEND_REGION                  Region of the state bucket
# TF_BACKEND_DYNAMODB_TABLE          DynamoDB lock table             (create once)
# TF_VAR_route53_zone_id             Route53 hosted zone ID
# TF_VAR_acm_certificate_arn         ACM cert ARN (must be us-east-1)
# TF_VAR_bedrock_model_id            AWS Bedrock model ID (default: Claude Sonnet 4.5)
# TF_VAR_google_oauth_client_id      Google OAuth 2.0 Client ID
# TF_VAR_google_oauth_client_secret  Google OAuth 2.0 Client Secret
# TF_VAR_linkedin_client_id          LinkedIn OAuth 2.0 Client ID
# TF_VAR_linkedin_client_secret      LinkedIn OAuth 2.0 Client Secret
# TF_VAR_facebook_page_token          Facebook Page Access Token (long-lived)
# TF_VAR_facebook_page_id             Facebook Page ID
# TF_VAR_instagram_business_id        Instagram Business Account ID (separate from Facebook Page ID)
# ─────────────────────────────────────────────────────────────────────────────

env:
  AWS_REGION:    ${{ secrets.AWS_REGION }}
  NODE_VERSION:  '22'
  TF_VERSION:    '1.9.5'
  TF_DIR:        terraform

permissions:
  id-token: write
  contents: read

# ═════════════════════════════════════════════════════════════════════════════
# JOB 0: Bootstrap — create Terraform state backend if it does not exist yet.
#         Safe to run on every deploy (all commands are idempotent).
# ═════════════════════════════════════════════════════════════════════════════
jobs:
  bootstrap:
    name: 🛠 Bootstrap state backend
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-deploy-bootstrap
          aws-region:        ${{ env.AWS_REGION }}

      - name: Create S3 state bucket (idempotent)
        run: |
          BUCKET="${{ secrets.TF_BACKEND_BUCKET }}"
          REGION="${{ secrets.TF_BACKEND_REGION }}"
          echo "→ Ensuring Terraform state bucket: $BUCKET in $REGION"
          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "✓ Bucket already exists"
          else
            if [ "$REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET" --region "$REGION"
            else
              aws s3api create-bucket --bucket "$BUCKET" --region "$REGION" \
                --create-bucket-configuration LocationConstraint="$REGION"
            fi
            echo "✓ Bucket created"
          fi
          # Enable versioning (idempotent)
          aws s3api put-bucket-versioning --bucket "$BUCKET" \
            --versioning-configuration Status=Enabled
          # Block public access (idempotent)
          aws s3api put-public-access-block --bucket "$BUCKET" \
            --public-access-block-configuration \
              BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
          echo "✓ Bucket hardened"

      - name: Create DynamoDB lock table (idempotent)
        run: |
          TABLE="${{ secrets.TF_BACKEND_DYNAMODB_TABLE }}"
          REGION="${{ secrets.TF_BACKEND_REGION }}"
          echo "→ Ensuring DynamoDB lock table: $TABLE"
          if aws dynamodb describe-table --table-name "$TABLE" --region "$REGION" 2>/dev/null; then
            echo "✓ Table already exists"
          else
            aws dynamodb create-table \
              --table-name "$TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$REGION"
            aws dynamodb wait table-exists --table-name "$TABLE" --region "$REGION"
            echo "✓ Table created"
          fi

# ═════════════════════════════════════════════════════════════════════════════
# JOB 1: Terraform — provision / update all AWS infrastructure
# ═════════════════════════════════════════════════════════════════════════════
  terraform:
    name: 🏗 Terraform apply
    runs-on: ubuntu-latest
    needs: bootstrap

    outputs:
      frontend_bucket: ${{ steps.outputs.outputs.frontend_bucket }}
      cloudfront_id: ${{ steps.outputs.outputs.cloudfront_id }}
      api_endpoint_b64: ${{ steps.outputs.outputs.api_endpoint_b64 }}
      google_oauth_redirect_b64: ${{ steps.outputs.outputs.google_oauth_redirect_b64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Lambda node_modules
        uses: actions/cache@v4
        with:
          path: lambda/*/node_modules
          key: lambda-${{ hashFiles('lambda/*/package.json') }}
          restore-keys: |
            lambda-

      - name: Build all Lambdas
        run: |
          echo "→ Building all Lambda functions..."
          for lambda in presign ingest agent-router google-auth email-sender social-poster doc-drive; do
            echo "  Building $lambda..."
            cd lambda/$lambda
            npm install
            npm run build
            cd ../..
          done
          echo "✓ All Lambdas built successfully"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-deploy-terraform
          aws-region:        ${{ env.AWS_REGION }}

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false  # Must be false for clean $(terraform output -raw) capture

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="region=${{ secrets.TF_BACKEND_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_BACKEND_DYNAMODB_TABLE }}" \
            -backend-config="encrypt=true" \
            -input=false \
            -no-color

      - name: Terraform validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate -no-color

      - name: Terraform plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan \
            -out=tfplan \
            -input=false \
            -no-color \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="route53_zone_id=${{ secrets.TF_VAR_route53_zone_id }}" \
            -var="acm_certificate_arn=${{ secrets.TF_VAR_acm_certificate_arn }}" \
            -var="bedrock_model_id=${{ secrets.TF_VAR_bedrock_model_id }}" \
            -var="google_oauth_client_id=${{ secrets.TF_VAR_google_oauth_client_id }}" \
            -var="google_oauth_client_secret=${{ secrets.TF_VAR_google_oauth_client_secret }}" \
            -var="supabase_url=${{ secrets.TF_VAR_SUPABASE_URL }}" \
            -var="supabase_service_role_key=${{ secrets.TF_VAR_SUPABASE_SERVICE_ROLE_KEY }}" \
            -var="linkedin_client_id=${{ secrets.TF_VAR_linkedin_client_id }}" \
            -var="linkedin_client_secret=${{ secrets.TF_VAR_linkedin_client_secret }}" \
            -var="facebook_page_token=${{ secrets.TF_VAR_facebook_page_token }}" \
            -var="facebook_page_id=${{ secrets.TF_VAR_facebook_page_id }}" \
            -var="instagram_business_id=${{ secrets.TF_VAR_instagram_business_id }}"
        env:
          TF_VAR_route53_zone_id: "${{ secrets.TF_VAR_route53_zone_id }}"
          TF_VAR_acm_certificate_arn: "${{ secrets.TF_VAR_acm_certificate_arn }}"
          TF_VAR_bedrock_model_id: "${{ secrets.TF_VAR_bedrock_model_id }}"
          TF_VAR_google_oauth_client_id: "${{ secrets.TF_VAR_google_oauth_client_id }}"
          TF_VAR_google_oauth_client_secret: "${{ secrets.TF_VAR_google_oauth_client_secret }}"
          TF_VAR_linkedin_client_id: "${{ secrets.TF_VAR_linkedin_client_id }}"
          TF_VAR_linkedin_client_secret: "${{ secrets.TF_VAR_linkedin_client_secret }}"
          TF_VAR_facebook_page_token: "${{ secrets.TF_VAR_facebook_page_token }}"
          TF_VAR_facebook_page_id: "${{ secrets.TF_VAR_facebook_page_id }}"
          TF_VAR_instagram_business_id: "${{ secrets.TF_VAR_instagram_business_id }}"

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        if: ${{ github.event.inputs.tf_action != 'plan' }}
        run: terraform apply -input=false -no-color -auto-approve tfplan

      - name: Extract Terraform outputs
        id: outputs
        working-directory: ${{ env.TF_DIR }}
        shell: bash
        run: |
          FRONTEND_BUCKET=$(terraform output -raw frontend_bucket_name)
          CLOUDFRONT_ID=$(terraform output -raw cloudfront_distribution_id)
          API_ENDPOINT=$(terraform output -raw api_endpoint)
          GOOGLE_REDIRECT=$(terraform output -raw google_oauth_redirect_uri)
      
          echo "frontend_bucket=$FRONTEND_BUCKET" >> "$GITHUB_OUTPUT"
          echo "cloudfront_id=$CLOUDFRONT_ID" >> "$GITHUB_OUTPUT"
      
          echo "api_endpoint_b64=$(echo -n "$API_ENDPOINT" | base64 | tr -d '\n')" >> "$GITHUB_OUTPUT"
          echo "google_oauth_redirect_b64=$(echo -n "$GOOGLE_REDIRECT" | base64 | tr -d '\n')" >> "$GITHUB_OUTPUT"

      - name: Debug Terraform outputs
        run: |
          echo "frontend_bucket=${{ steps.outputs.outputs.frontend_bucket }}"
          echo "cloudfront_id=${{ steps.outputs.outputs.cloudfront_id }}"
          echo "api_endpoint_b64=${{ steps.outputs.outputs.api_endpoint_b64 }}"

      - name: Print OAuth redirect URI (add this to Google Cloud Console)
        run: |
          echo ""
          echo "════════════════════════════════════════════════════════════════"
          echo "  ACTION REQUIRED (first deploy only)"
          echo "  Add this Authorized redirect URI to your Google OAuth client:"
          echo "  ${{ steps.outputs.outputs.google_oauth_redirect }}"
          echo "  → console.cloud.google.com/apis/credentials"
          echo "════════════════════════════════════════════════════════════════"

# ═════════════════════════════════════════════════════════════════════════════
# JOB 2: Build and deploy the React PWA to S3 + invalidate CloudFront
# ═════════════════════════════════════════════════════════════════════════════
  deploy-frontend:
    name: 🌐 Build & deploy frontend
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-${{ hashFiles('frontend/package.json') }}
          restore-keys: |
            frontend-

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-deploy-frontend
          aws-region:        ${{ env.AWS_REGION }}

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Decode API endpoint
        run: |
          echo "VITE_API_BASE_URL=$(echo '${{ needs.terraform.outputs.api_endpoint_b64 }}' | base64 -d)" >> $GITHUB_ENV

      - name: Build PWA
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ env.VITE_API_BASE_URL }}
      
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      
          VITE_APP_VERSION: ${{ github.sha }}
          VITE_ENVIRONMENT: production
          NODE_ENV: production

      - name: Sync hashed assets (long-cache, immutable)
        run: |
          aws s3 sync frontend/dist/ \
            s3://${{ needs.terraform.outputs.frontend_bucket }}/ \
            --exclude "*.html" \
            --exclude "sw.js" \
            --exclude "manifest.json" \
            --exclude "robots.txt" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

      - name: Upload HTML files (explicit find+cp — sync glob unreliable for root-level files)
        run: |
          BUCKET="s3://${{ needs.terraform.outputs.frontend_bucket }}"
          find frontend/dist -name '*.html' | while read file; do
            key="${file#frontend/dist/}"
            aws s3 cp "$file" "$BUCKET/$key" \
              --cache-control "no-cache, no-store, must-revalidate" \
              --content-type "text/html; charset=UTF-8"
            echo "✓ Uploaded $key"
          done

      - name: Sync service worker (no-cache — must always be fresh)
        run: |
          aws s3 cp frontend/dist/sw.js \
            s3://${{ needs.terraform.outputs.frontend_bucket }}/sw.js \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "application/javascript"

      - name: Sync manifest.json (short-cache)
        run: |
          aws s3 cp frontend/dist/manifest.json \
            s3://${{ needs.terraform.outputs.frontend_bucket }}/manifest.json \
            --cache-control "public, max-age=3600" \
            --content-type "application/manifest+json"

      - name: Sync robots.txt
        run: |
          aws s3 cp frontend/dist/robots.txt \
            s3://${{ needs.terraform.outputs.frontend_bucket }}/robots.txt \
            --cache-control "public, max-age=86400" \
            --content-type "text/plain" 2>/dev/null || true

      - name: Invalidate CloudFront cache
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ needs.terraform.outputs.cloudfront_id }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "CloudFront invalidation created: $INVALIDATION_ID"
          echo "Waiting for invalidation to complete..."
          aws cloudfront wait invalidation-completed \
            --distribution-id ${{ needs.terraform.outputs.cloudfront_id }} \
            --id "$INVALIDATION_ID"
          echo "✓ Cache cleared"

# ═════════════════════════════════════════════════════════════════════════════
# JOB 3: Smoke-test — verify the deployment is live and returning HTTP 200
# ═════════════════════════════════════════════════════════════════════════════
  smoke-test:
    name: ✅ Smoke test
    runs-on: ubuntu-latest
    needs: [terraform, deploy-frontend]

    steps:
      - name: Wait 15 s for DNS propagation
        run: sleep 15

      - name: Test API health — list agents
        run: |
          API=$(echo '${{ needs.terraform.outputs.api_endpoint_b64 }}' | base64 -d)
          if [ -z "$API" ]; then
            echo "⚠ API endpoint is empty (Terraform output not captured) — skipping curl check"
            exit 0
          fi
          echo "Testing: $API/agents"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            --max-time 20 \
            "$API/agents" 2>/dev/null) || STATUS="000"
          echo "HTTP status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✓ /agents returned 200"
          else
            echo "⚠ /agents returned $STATUS — check Lambda cold-start logs in CloudWatch"
          fi

      - name: Test API health — analytics summary
        run: |
          API=$(echo '${{ needs.terraform.outputs.api_endpoint_b64 }}' | base64 -d)
          if [ -z "$API" ]; then echo "⚠ Skipping — empty endpoint"; exit 0; fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 20 \
            "$API/analytics/summary" 2>/dev/null) || STATUS="000"
          echo "HTTP status (analytics): $STATUS"

      - name: Print deployment summary
        run: |
          echo ""
          echo "════════════════════════════════════════════════════════════════"
          echo "  ✅  DEPLOYMENT COMPLETE"
          echo ""
          echo "  App URL     : https://ops.stellarglobalsupplies.com"
          API=$(echo '${{ needs.terraform.outputs.api_endpoint_b64 }}' | base64 -d)
          echo "  API URL     : $API"
          echo "  Commit      : ${{ github.sha }}"
          echo "  Deployed at : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  AI model: Claude Sonnet 4.5 (AWS Bedrock)"
          echo ""
          echo "  Dashboards available:"
          echo "  • CEO Sales & Purchase Dashboard"
          echo "  • AI Agent Workspace (6 agents)"
          echo "  • Data Ingestion (CSV/JSON upload)"
          echo "  • Sales Analytics"
          echo "  • Meta Marketing Intelligence"
          echo "  • Order Management"
          echo ""
          echo "  Observability dashboards: https://observe.stellarglobalsupplies.com"
          echo "  • API Monitoring"
          echo "  • AWS Cost Dashboard"
          echo "  • Web Traffic Analytics"
          echo "  • Supabase Database Metrics"
          echo ""
          echo "  Cleanup jobs: https://github.com/Stellar-Global-Supplies/stellarglobalsupplies-cleanup"
          echo "  • DynamoDB cleanup: daily at 9am IST"
          echo "  • S3 cleanup: daily at 6:45 AM IST"
          echo "════════════════════════════════════════════════════════════════