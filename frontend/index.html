<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#00B98E" media="(prefers-color-scheme: light)" />
    <meta name="description" content="Internal operational control center and AI workforce dashboard for Stellar Global Supplies." />
    <meta name="application-name" content="SGS Ops Center" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SGS Ops" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preconnect to API -->
    <link rel="preconnect" href="%VITE_API_BASE_URL%" crossorigin />

    <title>SGS Ops Center — Stellar Global Supplies</title>

    <!-- Inline critical CSS to prevent flash of unstyled content -->
    <style>
      :root { color-scheme: dark; }
      html, body, #root {
        margin: 0; padding: 0;
        background-color: #020617;
        color: #f1f5f9;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      /* Loading spinner shown before React hydrates */
      #root:empty::before {
        content: '';
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
