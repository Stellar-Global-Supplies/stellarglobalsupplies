<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — SGS Ops Center</title>
    <style>
      html, body {
        margin: 0; height: 100%;
        background: #0f172a;
        color: #f1f5f9;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        display: flex; align-items: center; justify-content: center;
      }
      .card {
        text-align: center;
        padding: 2rem;
        max-width: 360px;
      }
      .icon {
        width: 56px; height: 56px;
        margin: 0 auto 1rem;
        border-radius: 16px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        display: flex; align-items: center; justify-content: center;
        font-weight: 700; font-size: 1.5rem; color: white;
      }
      h1 { font-size: 1.125rem; margin: 0 0 0.5rem; }
      p  { font-size: 0.875rem; color: #94a3b8; line-height: 1.5; margin: 0 0 1.5rem; }
      button {
        background: #4f6ef7; color: white; border: none;
        padding: 0.625rem 1.25rem; border-radius: 0.5rem;
        font-size: 0.875rem; font-weight: 500; cursor: pointer;
      }
      button:hover { background: #3b55e6; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">S</div>
      <h1>You're offline</h1>
      <p>
        SGS Ops Center can't reach the network right now. Previously visited
        pages are available offline — any chat messages or uploads will
        sync automatically once you're back online.
      </p>
      <button onclick="window.location.reload()">Retry</button>
    </div>
  </body>
</html>
